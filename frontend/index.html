<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GetSkills - Local Skill Exchange Platform</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Icons (Feather Icons via CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    
    <style>
        * {
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .primary-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
        }

        .smooth-transition {
            transition: all 0.3s ease;
        }

        .card-hover {
            @apply hover:shadow-lg hover:scale-105 smooth-transition;
        }

        @keyframes slideIn {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .animate-slide-in {
            animation: slideIn 0.3s ease;
        }

        .toast {
            @apply fixed top-6 right-6 px-4 py-3 rounded-lg shadow-lg text-white animate-slide-in;
            z-index: 9999;
        }

        .toast-success {
            @apply bg-green-500;
        }

        .toast-error {
            @apply bg-red-500;
        }

        .toast-info {
            @apply bg-indigo-500;
        }
    </style>
</head>
<body class="bg-white text-slate-900">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
